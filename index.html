<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Gift Card</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <h1>Today is Marzia's Birthday! 🎉</h1>
        <img src ="images/marzia.jpg" alt="Gift Card Image" id="image">
        <h2 id="age">22 years Old</h2>
        <h4 id="date">16.06.2026</h4>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">Here's how happy I am for you today 🥳</h2>
        <h3 class="hover-hint">(Hover over the gift)</h3>
        <div class="gift-img" id="gift1"></div>
    </div>
    <h2 class="gift-title">How people react when you enter the room!</h2>
    <div class="gift-img" id="gift2"></div>

    <h2 class="gift-title">If I had to describe you in one word 👇</h2>
    <div class="gift-img" id="gift3"></div>

    <h2 class="gift-title">Only person badass than you?</h2>
    <div class="gift-img" id="gift4"></div>

    <h2 class="gift-title">This one is for you! 🫂</h2>
    <div class="gift-img" id="gift5"></div>
</body>
</html>
